services:

  # FastAPI applicatie — draait intern op 127.0.0.1:8000
  # Nginx op de host regelt TLS en routing (zie nginx/kmv.melotto.nl.conf)
  app:
    build: .
    container_name: kmv-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - APP_PASSWORD=${APP_PASSWORD:-changeme}
      - SECRET_KEY=${SECRET_KEY:-vervang-dit-met-een-lang-willekeurig-geheim}
      - DATABASE_URL=sqlite:////app/data/kmv.db
      - ALLOWED_HOST=kmv.melotto.nl
    volumes:
      - kmv-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  kmv-data:
