services:

  # ──────────────────────────────────────────
  # FastAPI applicatie
  # ──────────────────────────────────────────
  app:
    build: .
    container_name: kmv-app
    restart: unless-stopped
    environment:
      - APP_PASSWORD=${APP_PASSWORD:-changeme}
      - SECRET_KEY=${SECRET_KEY:-vervang-dit-met-een-lang-willekeurig-geheim}
      - DATABASE_URL=sqlite:////app/data/kmv.db
      - ALLOWED_HOST=kmv.melotto.nl
    volumes:
      - kmv-data:/app/data
    networks:
      - kmv-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────
  # Nginx reverse proxy + TLS
  # ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: kmv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    networks:
      - kmv-net
    depends_on:
      - app

  # ──────────────────────────────────────────
  # Certbot voor Let's Encrypt certificaten
  # ──────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: kmv-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  kmv-data:
  certbot-www:
  certbot-certs:

networks:
  kmv-net:
    driver: bridge
