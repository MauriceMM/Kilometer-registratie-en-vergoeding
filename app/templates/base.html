<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}KMV{% endblock %} — Kilometervergoeding</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js" defer></script>
  <style>
    :root {
      --blauw: #1a56db;
      --blauw-dark: #1e429f;
      --groen: #057a55;
      --rood: #e02424;
      --grijs: #6b7280;
      --bg: #f9fafb;
      --border: #e5e7eb;
      --wit: #ffffff;
      --tekst: #111827;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--tekst); font-size: 15px; }

    /* Navigatie */
    nav { background: var(--blauw-dark); color: white; padding: 0 24px; display: flex; align-items: center; gap: 8px; height: 56px; }
    nav .logo { font-size: 18px; font-weight: 700; margin-right: 16px; text-decoration: none; color: white; display: flex; align-items: center; gap: 8px; }
    nav a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 14px; transition: background 0.15s; }
    nav a:hover, nav a.actief { background: rgba(255,255,255,0.15); color: white; }
    nav .spacer { flex: 1; }
    nav form { margin: 0; }
    nav button.logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    nav button.logout:hover { background: rgba(255,255,255,0.2); }

    /* Hoofd layout */
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
    .ondertitel { color: var(--grijs); font-size: 14px; margin-bottom: 24px; }

    /* Kaarten */
    .kaart { background: var(--wit); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .kaart-grid { display: grid; gap: 16px; }
    .kaart-grid.col2 { grid-template-columns: repeat(2, 1fr); }
    .kaart-grid.col3 { grid-template-columns: repeat(3, 1fr); }
    .kaart-grid.col4 { grid-template-columns: repeat(4, 1fr); }

    /* Statistiek-kaartjes */
    .stat { background: var(--wit); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
    .stat .label { font-size: 13px; color: var(--grijs); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat .waarde { font-size: 28px; font-weight: 700; color: var(--blauw-dark); }
    .stat .sub { font-size: 13px; color: var(--grijs); margin-top: 4px; }

    /* Knoppen */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.15s; }
    .btn-primair { background: var(--blauw); color: white; }
    .btn-primair:hover { background: var(--blauw-dark); }
    .btn-succes { background: var(--groen); color: white; }
    .btn-succes:hover { background: #046c4e; }
    .btn-gevaar { background: var(--rood); color: white; }
    .btn-gevaar:hover { background: #c81e1e; }
    .btn-grijs { background: #f3f4f6; color: var(--tekst); border: 1px solid var(--border); }
    .btn-grijs:hover { background: #e5e7eb; }
    .btn-lg { padding: 13px 28px; font-size: 16px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Formulieren */
    .veld { margin-bottom: 16px; }
    .veld label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    .veld input, .veld select, .veld textarea {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; background: white; color: var(--tekst);
      transition: border-color 0.15s;
    }
    .veld input:focus, .veld select:focus, .veld textarea:focus {
      outline: none; border-color: var(--blauw); box-shadow: 0 0 0 3px rgba(26,86,219,0.15);
    }

    /* Tabel */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--grijs); padding: 10px 12px; border-bottom: 2px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }

    /* Badges */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-zakelijk { background: #dbeafe; color: #1e40af; }
    .badge-prive { background: #f3f4f6; color: #6b7280; }
    .badge-actief { background: #d1fae5; color: #065f46; }

    /* Alerts */
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .alert-info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
    .alert-succes { background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; }
    .alert-waarschuwing { background: #fffbeb; border: 1px solid #fcd34d; color: #92400e; }

    /* Actieve rit banner */
    .actieve-rit-banner {
      background: linear-gradient(135deg, #065f46, #047857);
      color: white; border-radius: 12px; padding: 20px 24px;
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 24px;
    }
    .actieve-rit-banner .puls {
      width: 14px; height: 14px; background: #6ee7b7; border-radius: 50%;
      animation: puls 1.5s infinite;
      flex-shrink: 0;
    }
    @keyframes puls { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }

    /* Responsief */
    @media (max-width: 640px) {
      .kaart-grid.col3, .kaart-grid.col4 { grid-template-columns: 1fr 1fr; }
      .kaart-grid.col2 { grid-template-columns: 1fr; }
      nav .nav-links { display: none; }
    }
    @media (max-width: 400px) {
      .kaart-grid.col3, .kaart-grid.col4 { grid-template-columns: 1fr; }
    }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: white; border-radius: 16px; padding: 28px; max-width: 480px; width: 100%; }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

    .gap { gap: 12px; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .mt-4 { margin-top: 16px; }
    .mt-6 { margin-top: 24px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .w-full { width: 100%; }
    .text-sm { font-size: 13px; }
    .text-grijs { color: var(--grijs); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="logo">🚗 KMV</a>
  <div class="nav-links" style="display:flex;gap:4px;">
    <a href="/" {% if request.url.path == '/' %}class="actief"{% endif %}>Dashboard</a>
    <a href="/overzicht" {% if '/overzicht' in request.url.path %}class="actief"{% endif %}>Overzicht</a>
    <a href="/instellingen" {% if '/instellingen' in request.url.path %}class="actief"{% endif %}>Instellingen</a>
  </div>
  <div class="spacer"></div>
  <form action="/logout" method="post">
    <button class="logout" type="submit">Uitloggen</button>
  </form>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}
</body>
</html>
