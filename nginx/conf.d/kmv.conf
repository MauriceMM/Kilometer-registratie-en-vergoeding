# ──────────────────────────────────────────────────────────────
# Stap 1: HTTP → HTTPS redirect + Let's Encrypt ACME challenge
# ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name kmv.melotto.nl;

    # Let's Encrypt challenge (voor certificaatvernieuwing)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Al het andere: redirect naar HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────────
# Stap 2: HTTPS server (na certificaat-aanvraag actief)
# ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name kmv.melotto.nl;

    # TLS certificaten (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/kmv.melotto.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kmv.melotto.nl/privkey.pem;

    # Moderne TLS-configuratie
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS (1 jaar) — zet dit pas aan nadat HTTPS werkt!
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Ratelimit op inlogpagina
    location /login {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy naar FastAPI
    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Cookie-beveiliging via proxy
        proxy_cookie_flags ~ secure samesite=lax;
    }
}
