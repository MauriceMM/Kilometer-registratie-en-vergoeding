# Nginx config voor kmv.melotto.nl
# Kopieer naar /etc/nginx/sites-available/kmv.melotto.nl
# en symlink: sudo ln -s /etc/nginx/sites-available/kmv.melotto.nl /etc/nginx/sites-enabled/

# HTTP → HTTPS redirect + Let's Encrypt ACME challenge
server {
    listen 80;
    server_name kmv.melotto.nl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → FastAPI app op poort 8000
server {
    listen 443 ssl;
    http2 on;
    server_name kmv.melotto.nl;

    ssl_certificate     /etc/letsencrypt/live/kmv.melotto.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kmv.melotto.nl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Rate limit op login
    limit_req_zone $binary_remote_addr zone=kmv_login:10m rate=5r/m;
    location /login {
        limit_req zone=kmv_login burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
